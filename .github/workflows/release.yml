name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || \
          gh release create "$TAG_NAME" \
            --title "BlogCraft $TAG_NAME" \
            --notes "Portable BlogCraft binaries — no installation or dependencies required. Run the file for your operating system; BlogCraft starts locally and opens the browser automatically. The Android APK is an experimental preview: enable \"install from unknown sources\" to sideload it."

  windows:
    name: Windows portable binary
    needs: create-release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows release
        run: npm run release:win

      - name: Upload Windows asset
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $asset = Get-ChildItem dist -Filter *.exe | Select-Object -First 1
          gh release upload "$env:TAG_NAME" "$($asset.FullName)" --clobber

  linux:
    name: Linux portable binary
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Linux release
        run: npm run release:linux

      - name: Mark executable
        run: chmod +x dist/blogcraft-*-linux-x64

      - name: Upload Linux asset
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release upload "$TAG_NAME" dist/blogcraft-*-linux-x64 --clobber

  macos:
    name: macOS portable binaries
    needs: create-release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS releases
        run: npm run release:macos

      - name: Ad-hoc sign macOS binaries
        run: |
          codesign --force --sign - dist/blogcraft-*-macos-x64
          codesign --force --sign - dist/blogcraft-*-macos-arm64

      - name: Mark executable
        run: chmod +x dist/blogcraft-*-macos-*

      - name: Upload macOS assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release upload "$TAG_NAME" dist/blogcraft-*-macos-* --clobber

  android:
    name: Android APK
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Prepare signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/blogcraft-dist.keystore
            echo "Using signing keystore from repository secret"
          else
            keytool -genkeypair -keystore android/blogcraft-dist.keystore -alias blogcraft \
              -keyalg RSA -keysize 2048 -validity 10950 \
              -storepass blogcraft -keypass blogcraft \
              -dname "CN=BlogCraft, O=hubertdungen"
            echo "No ANDROID_KEYSTORE_BASE64 secret set; generated an ephemeral signing key (APK signature will differ between releases)"
          fi

      - name: Build signed APK
        env:
          BLOGCRAFT_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'blogcraft' }}
          BLOGCRAFT_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'blogcraft' }}
          BLOGCRAFT_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || 'blogcraft' }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cp android/app/build/outputs/apk/release/app-release.apk "blogcraft-${VERSION}-android.apk"
          echo "APK_NAME=blogcraft-${VERSION}-android.apk" >> "$GITHUB_ENV"

      - name: Upload Android asset
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release upload "$TAG_NAME" "$APK_NAME" --clobber
