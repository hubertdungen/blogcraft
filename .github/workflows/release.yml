name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || \
          gh release create "$TAG_NAME" \
            --title "BlogCraft $TAG_NAME" \
            --notes "Portable BlogCraft binaries. Run the file for your operating system; BlogCraft starts locally and opens the browser automatically."

  windows:
    name: Windows portable binary
    needs: create-release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows release
        run: npm run release:win

      - name: Upload Windows asset
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $asset = Get-ChildItem dist -Filter *.exe | Select-Object -First 1
          gh release upload "$env:TAG_NAME" "$($asset.FullName)" --clobber

  linux:
    name: Linux portable binary
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Linux release
        run: npm run release:linux

      - name: Mark executable
        run: chmod +x dist/blogcraft-*-linux-x64

      - name: Upload Linux asset
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release upload "$TAG_NAME" dist/blogcraft-*-linux-x64 --clobber

  macos:
    name: macOS portable binaries
    needs: create-release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS releases
        run: npm run release:macos

      - name: Ad-hoc sign macOS binaries
        run: |
          codesign --force --sign - dist/blogcraft-*-macos-x64
          codesign --force --sign - dist/blogcraft-*-macos-arm64

      - name: Mark executable
        run: chmod +x dist/blogcraft-*-macos-*

      - name: Upload macOS assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release upload "$TAG_NAME" dist/blogcraft-*-macos-* --clobber
